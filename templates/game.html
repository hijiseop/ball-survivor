<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Survivor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        #loading { font-size: 18px; color: #aaa; }
        #gameCanvas { display: block; cursor: none; }
        #backBtn {
            position: fixed; bottom: 14px; left: 14px;
            padding: 6px 18px; background: transparent;
            border: 1px solid #555; color: #aaa;
            border-radius: 6px; cursor: pointer; font-size: 13px; z-index: 10;
        }
        #backBtn:hover { border-color: #fff; color: #fff; }
    </style>
</head>
<body>
    <div id="loading">연결 중...</div>
    <canvas id="gameCanvas" style="display:none"></canvas>
    <button id="backBtn" onclick="window.location.href='/'">← 선택으로</button>

    <!-- Socket.io 클라이언트 (서버에서 자동 서빙) -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- PvP 게임 클라이언트 메인 -->
    <script type="module" src="/client/game.js"></script>
</body>
</html>
