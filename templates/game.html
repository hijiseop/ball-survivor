<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Survivor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: #fff;
            overflow: hidden;
        }
        #loading { font-size: 18px; color: #aaa; }
        #gameCanvas { display: block; cursor: none; }
        #backBtn {
            position: fixed; bottom: 14px; left: 14px;
            padding: 6px 18px; background: transparent;
            border: 1px solid #555; color: #aaa;
            border-radius: 6px; cursor: pointer; font-size: 13px; z-index: 10;
        }
        #backBtn:hover { border-color: #fff; color: #fff; }
    </style>
</head>
<body>
    <div id="loading">캐릭터 불러오는 중...</div>
    <canvas id="gameCanvas" style="display:none"></canvas>
    <button id="backBtn" onclick="window.location.href='/'">← 선택으로</button>

<script>
// ════════════════════════════════════════════════════
// 상수
// ════════════════════════════════════════════════════
const BALL_R          = 15;
const INVINCIBLE_MS   = 1500;
const BALL_ADD_MS     = 10000;
const DMG_SCALE_MS    = 20000;
const ATTACK_INTERVAL = 5000;
const INIT_DAMAGE     = 10;
const INIT_SPEED      = 3;
const INIT_BALLS      = 5;
const SPEED_STEP      = 0.5;
const DMG_FACTOR      = 1.5;
const FRAME_MS        = 120;
const CHAR_SPEED      = 1.0; // 캐릭터 이동 속도 (px/frame, 월드 기준)
const TARGET_LERP     = 0.06; // 마우스 타겟 스무딩 (0~1, 낮을수록 둔감)
const STOP_DIST       = 10;  // 이 거리 이내면 정지
const ZOOM            = 1.3; // 카메라 줌 배율 (클수록 확대)

const ACTION_STAND   = 'A00';
const ACTION_WALK    = 'A02';
const ACTION_ATTACKS = ['A13', 'A14', 'A15'];

// 캐릭터 스케일 / 히트박스 기준값 (100%)
const CHAR_SCALE   = 0.6;
const HIT_OFFSET_X = -5;
const HIT_OFFSET_Y = 11;

// 미니맵
const MM_W = 200; // 미니맵 너비 (높이는 비율로 계산)
const MM_PAD = 12;

// ════════════════════════════════════════════════════
// 월드 / 뷰포트 크기 (배경 로드 후 결정)
// ════════════════════════════════════════════════════
let WORLD_W = 1920, WORLD_H = 1080;
let VIEW_W  = 800,  VIEW_H  = 600;

// ════════════════════════════════════════════════════
// 배경 이미지 (한 번만 로드)
// ════════════════════════════════════════════════════
const bgImg = new Image();
bgImg.src = '/battlemap.png';

// ════════════════════════════════════════════════════
// 카메라
// ════════════════════════════════════════════════════
let camX = 0, camY = 0;

function updateCamera(wx, wy) {
    const vww = VIEW_W / ZOOM, vwh = VIEW_H / ZOOM;
    camX = Math.max(0, Math.min(wx - vww / 2, WORLD_W - vww));
    camY = Math.max(0, Math.min(wy - vwh / 2, WORLD_H - vwh));
}

// 스크린 → 월드 (줌 적용)
function toWorld(sx, sy)  { return { x: sx / ZOOM + camX, y: sy / ZOOM + camY }; }
// 월드 → 스크린 (줌 적용)
function toScreen(wx, wy) { return { x: (wx - camX) * ZOOM, y: (wy - camY) * ZOOM }; }

// ════════════════════════════════════════════════════
// 전역 게임 상태
// ════════════════════════════════════════════════════
let character, canvas, ctx;

// 마우스 (스크린 좌표)
let screenMx = 0, screenMy = 0;
// 캐릭터 (월드 좌표)
let worldMx = 0, worldMy = 0;
// 스무딩된 타겟 (월드 좌표)
let smoothTargetX = 0, smoothTargetY = 0;

let balls = [];
let hp, maxHp, curDmg, curSpeed;
let invincibleUntil, startTime, lastBallTime, lastDmgTime;
let attackUntil, lastAttackTime;
let running = false;
let bestTime = 0;
let rafId;
let facingRight = false;

// ════════════════════════════════════════════════════
// 캐릭터 렌더 / 히트박스
// ════════════════════════════════════════════════════
let charImgW = 0, charImgH = 0;
let charOffsetX = 0, charOffsetY = 0;
let hitW = 30, hitH = 50;
let hitOffsetX = HIT_OFFSET_X;
let hitOffsetY = HIT_OFFSET_Y;

// ════════════════════════════════════════════════════
// 애니메이션
// ════════════════════════════════════════════════════
const frames = { stand: [], walk: [], A13: [], A14: [], A15: [] };
let curAnimKey    = 'stand';
let curFrame      = 0;
let lastFrameTime = 0;
let walkUntil     = 0;
let attackSeq     = [];

// ════════════════════════════════════════════════════
// URL / 프리로드
// ════════════════════════════════════════════════════
function getLookUrl(actionFrame) {
    return `${character.character_image.split('?')[0]}?action=${actionFrame}`;
}

function preloadFrames(actionPrefix, maxFrames = 8) {
    const promises = Array.from({ length: maxFrames }, (_, i) =>
        new Promise(resolve => {
            const img = new Image();
            const t = setTimeout(() => resolve(null), 5000);
            img.onload  = () => { clearTimeout(t); resolve(img); };
            img.onerror = () => { clearTimeout(t); resolve(null); };
            img.src = getLookUrl(`${actionPrefix}.${i}`);
        })
    );
    return Promise.all(promises).then(results => {
        const list = [];
        for (const img of results) { if (!img) break; list.push(img); }
        return list;
    });
}

// ════════════════════════════════════════════════════
// 초기화
// ════════════════════════════════════════════════════
async function init() {
    const res = await fetch('/api/me');
    if (!res.ok) { window.location.href = '/'; return; }
    character = await res.json();

    document.getElementById('loading').textContent = '로딩 중...';

    // 배경 이미지 로드 완료 대기
    await new Promise(resolve => {
        if (bgImg.complete && bgImg.naturalWidth) { resolve(); return; }
        bgImg.onload = resolve; bgImg.onerror = resolve;
    });
    if (bgImg.naturalWidth) { WORLD_W = bgImg.naturalWidth; WORLD_H = bgImg.naturalHeight; }

    // 뷰포트 = 화면 크기 (맵보다 크지 않게)
    VIEW_W = Math.min(window.innerWidth,  WORLD_W);
    VIEW_H = Math.min(window.innerHeight, WORLD_H);

    // 프레임 프리로드
    [frames.stand, frames.walk, frames.A13, frames.A14, frames.A15] = await Promise.all([
        preloadFrames(ACTION_STAND),
        preloadFrames(ACTION_WALK),
        preloadFrames('A13'), preloadFrames('A14'), preloadFrames('A15'),
    ]);

    // 캐릭터 렌더 크기 / 히트박스 계산
    const sample = frames.stand[0] || frames.walk[0];
    if (sample) {
        const iw = sample.naturalWidth, ih = sample.naturalHeight;
        charImgW    = Math.round(iw * CHAR_SCALE);
        charImgH    = Math.round(ih * CHAR_SCALE);
        charOffsetX = -Math.round(charImgW / 2);
        charOffsetY = -Math.round(charImgH / 2);
        hitW        = Math.round((iw / 5 - 10) * CHAR_SCALE);
        hitH        = Math.round((ih / 3.5 - 11) * CHAR_SCALE);
        hitOffsetX  = Math.round(HIT_OFFSET_X * CHAR_SCALE);
        hitOffsetY  = Math.round(HIT_OFFSET_Y * CHAR_SCALE);
    }

    // 캔버스 설정
    canvas = document.getElementById('gameCanvas');
    canvas.width  = VIEW_W;
    canvas.height = VIEW_H;
    canvas.style.display = 'block';
    ctx = canvas.getContext('2d');

    // 마우스 이벤트
    canvas.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        screenMx = Math.max(0, Math.min(e.clientX - r.left, VIEW_W));
        screenMy = Math.max(0, Math.min(e.clientY - r.top,  VIEW_H));
    });

    document.getElementById('loading').style.display = 'none';
    startGame();
}

// ════════════════════════════════════════════════════
// 게임 시작 / 재시작
// ════════════════════════════════════════════════════
function startGame() {
    const now = Date.now();

    maxHp = character.character_level;
    hp = maxHp; curDmg = INIT_DAMAGE; curSpeed = INIT_SPEED;
    invincibleUntil = 0; walkUntil = 0;
    attackUntil = 0; lastAttackTime = now;
    facingRight = false;
    attackSeq = []; curAnimKey = 'stand'; curFrame = 0; lastFrameTime = 0;
    balls = []; running = true;
    startTime = lastBallTime = lastDmgTime = now;

    // 캐릭터 시작 위치 = 맵 중앙
    worldMx = WORLD_W / 2; worldMy = WORLD_H / 2;
    screenMx = VIEW_W / 2; screenMy = VIEW_H / 2;
    smoothTargetX = worldMx; smoothTargetY = worldMy;
    updateCamera(worldMx, worldMy);

    for (let i = 0; i < INIT_BALLS; i++) balls.push(mkBall());

    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════
// 공 생성 (뷰포트 경계에서 스폰)
// ════════════════════════════════════════════════════
function mkBall() {
    // 줌 적용 뷰포트의 월드 크기
    const vww = VIEW_W / ZOOM, vwh = VIEW_H / ZOOM;
    const edge = Math.floor(Math.random() * 4);
    let wx, wy;
    if      (edge === 0) { wx = camX + Math.random() * vww; wy = camY - BALL_R; }
    else if (edge === 1) { wx = camX + vww + BALL_R;         wy = camY + Math.random() * vwh; }
    else if (edge === 2) { wx = camX + Math.random() * vww; wy = camY + vwh + BALL_R; }
    else                 { wx = camX - BALL_R;                wy = camY + Math.random() * vwh; }

    // 캐릭터 방향으로 발사
    const tx = worldMx + (Math.random() - 0.5) * vww * 0.6;
    const ty = worldMy + (Math.random() - 0.5) * vwh * 0.6;
    const dx = tx - wx, dy = ty - wy;
    const d  = Math.sqrt(dx * dx + dy * dy) || 1;

    return {
        x: wx, y: wy,
        vx: (dx / d) * curSpeed,
        vy: (dy / d) * curSpeed,
        color: `hsl(${Math.random() * 360},70%,60%)`,
    };
}

// ════════════════════════════════════════════════════
// 현재 애니메이션 프레임 반환
// ════════════════════════════════════════════════════
function getCurrentFrame(now) {
    const isAttacking = now < attackUntil;
    let nextKey = isAttacking ? 'attack' : now < walkUntil ? 'walk' : 'stand';

    if (nextKey !== curAnimKey) { curAnimKey = nextKey; curFrame = 0; lastFrameTime = now; }
    if (now - lastFrameTime >= FRAME_MS) { curFrame++; lastFrameTime = now; }

    if (isAttacking && attackSeq.length > 0) {
        return attackSeq[Math.min(curFrame, attackSeq.length - 1)];
    }
    const f = frames[curAnimKey] || frames.stand;
    return f.length ? f[curFrame % f.length] : null;
}

// ════════════════════════════════════════════════════
// 메인 루프
// ════════════════════════════════════════════════════
function loop() {
    if (!running) return;
    const now = Date.now(), elapsed = now - startTime;

    // 마우스의 월드 좌표 (줌 적용) → 스무딩
    const rawX = screenMx / ZOOM + camX;
    const rawY = screenMy / ZOOM + camY;
    smoothTargetX += (rawX - smoothTargetX) * TARGET_LERP;
    smoothTargetY += (rawY - smoothTargetY) * TARGET_LERP;
    const targetX = smoothTargetX, targetY = smoothTargetY;

    // 캐릭터 → 마우스 방향으로 서서히 이동
    const mdx = targetX - worldMx, mdy = targetY - worldMy;
    const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
    if (mdist > STOP_DIST) {
        worldMx += (mdx / mdist) * CHAR_SPEED;
        worldMy += (mdy / mdist) * CHAR_SPEED;
        walkUntil = now + 200;
        if (Math.abs(mdx) > 5) facingRight = mdx > 0;
    }
    updateCamera(worldMx, worldMy);

    // 10초마다 공 추가 + 속도 업
    if (now - lastBallTime >= BALL_ADD_MS) {
        balls.push(mkBall());
        curSpeed += SPEED_STEP;
        for (const b of balls) {
            const spd = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
            b.vx = (b.vx / spd) * curSpeed;
            b.vy = (b.vy / spd) * curSpeed;
        }
        lastBallTime = now;
    }

    // 20초마다 데미지 x1.5
    if (now - lastDmgTime >= DMG_SCALE_MS) {
        curDmg = Math.round(curDmg * DMG_FACTOR);
        lastDmgTime = now;
    }

    // 5초마다 공격 (A13/A14/A15 무작위 순서 연속)
    if (now - lastAttackTime >= ATTACK_INTERVAL && now >= attackUntil) {
        const shuffled = [...ACTION_ATTACKS].sort(() => Math.random() - 0.5);
        attackSeq  = shuffled.flatMap(k => frames[k]);
        attackUntil    = now + (attackSeq.length * FRAME_MS || 360);
        lastAttackTime = now;
    }

    // 공 이동 + 맵 경계 반사
    for (const b of balls) {
        b.x += b.vx; b.y += b.vy;
        if (b.x - BALL_R < 0)        { b.x = BALL_R;           b.vx =  Math.abs(b.vx); }
        if (b.x + BALL_R > WORLD_W)   { b.x = WORLD_W - BALL_R; b.vx = -Math.abs(b.vx); }
        if (b.y - BALL_R < 0)        { b.y = BALL_R;           b.vy =  Math.abs(b.vy); }
        if (b.y + BALL_R > WORLD_H)   { b.y = WORLD_H - BALL_R; b.vy = -Math.abs(b.vy); }
    }

    // 충돌 판정 (월드 좌표, 직사각형 vs 원)
    const attacking = now < attackUntil;
    const hcx = worldMx + hitOffsetX, hcy = worldMy + hitOffsetY;
    for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];
        const nearX = Math.max(hcx - hitW/2, Math.min(b.x, hcx + hitW/2));
        const nearY = Math.max(hcy - hitH/2, Math.min(b.y, hcy + hitH/2));
        const dx = b.x - nearX, dy = b.y - nearY;
        if (Math.sqrt(dx * dx + dy * dy) < BALL_R) {
            if (attacking) {
                balls.splice(i, 1);
            } else if (now > invincibleUntil) {
                hp -= curDmg;
                invincibleUntil = now + INVINCIBLE_MS;
                if (hp <= 0) { hp = 0; doGameOver(elapsed); return; }
                break;
            }
        }
    }

    render(now, elapsed);
    rafId = requestAnimationFrame(loop);
}

// ════════════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════════════
function render(now, elapsed) {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);

    // ── 월드 공간 렌더 (카메라 + 줌 적용) ────────
    ctx.save();
    ctx.scale(ZOOM, ZOOM);
    ctx.translate(-camX, -camY);

    // 배경
    if (bgImg.complete && bgImg.naturalWidth) {
        ctx.drawImage(bgImg, 0, 0, WORLD_W, WORLD_H);
    } else {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);
    }

    // 공
    for (const b of balls) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.fill();
    }

    // 캐릭터
    const frame = getCurrentFrame(now);
    if (frame && charImgW) {
        const invincible = now < invincibleUntil;
        const blink = invincible && Math.floor(now / 100) % 2 === 0;
        if (!blink) {
            ctx.save();
            ctx.translate(worldMx, worldMy);
            if (facingRight) ctx.scale(-1, 1);
            ctx.drawImage(frame, charOffsetX, charOffsetY, charImgW, charImgH);
            ctx.restore();
        }
    }

    ctx.restore();

    // ── 스크린 공간 렌더 (HUD + 미니맵) ─────────
    drawHUD(now, elapsed);
    drawMinimap();
}

// ════════════════════════════════════════════════════
// HUD
// ════════════════════════════════════════════════════
function drawHUD(now, elapsed) {
    const barW = 260, barH = 20;
    const hpRatio = hp / maxHp;
    const hpColor = hpRatio > 0.5 ? '#4caf50' : hpRatio > 0.25 ? '#ff9800' : '#f44336';

    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(12, 12, barW + 8, 56);
    ctx.fillStyle = '#2a2a3a'; ctx.fillRect(16, 18, barW, barH);
    ctx.fillStyle = hpColor;   ctx.fillRect(16, 18, barW * hpRatio, barH);
    ctx.strokeStyle = '#555';  ctx.strokeRect(16, 18, barW, barH);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'left';
    ctx.fillText(`HP  ${hp} / ${maxHp}`, 20, 33);
    ctx.fillStyle = '#ccc'; ctx.font = '12px Arial';
    ctx.fillText(character.character_name, 16, 56);

    // 타이머
    const sec = Math.floor(elapsed / 1000);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial'; ctx.textAlign = 'center';
    ctx.fillText(
        `${String(Math.floor(sec / 60)).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`,
        VIEW_W / 2, 32
    );

    // 우측 정보
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(VIEW_W - 130, 12, 118, 72);
    ctx.fillStyle = '#ff7043'; ctx.font = 'bold 13px Arial';
    ctx.fillText(`데미지  ${curDmg}`, VIEW_W - 16, 32);
    ctx.fillStyle = '#90caf9';
    ctx.fillText(`공  ${balls.length}개`, VIEW_W - 16, 52);
    const cd = Math.min(1, (Date.now() - lastAttackTime) / ATTACK_INTERVAL);
    ctx.fillStyle = cd >= 1 ? '#ffd54f' : '#777'; ctx.font = '12px Arial';
    ctx.fillText(cd >= 1 ? '⚔ 공격 준비' : `⚔ ${((1 - cd) * 5).toFixed(1)}s`, VIEW_W - 16, 72);

    ctx.textAlign = 'left';
}

// ════════════════════════════════════════════════════
// 미니맵
// ════════════════════════════════════════════════════
function drawMinimap() {
    const MM_H   = Math.round(MM_W * WORLD_H / WORLD_W);
    const MX     = VIEW_W  - MM_W - MM_PAD;
    const MY     = VIEW_H  - MM_H - MM_PAD;
    const scaleX = MM_W / WORLD_W;
    const scaleY = MM_H / WORLD_H;

    // 배경 + 맵 이미지 축소
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(MX - 1, MY - 1, MM_W + 2, MM_H + 2);
    if (bgImg.complete && bgImg.naturalWidth) {
        ctx.globalAlpha = 0.7;
        ctx.drawImage(bgImg, MX, MY, MM_W, MM_H);
        ctx.globalAlpha = 1;
    }

    // 공
    for (const b of balls) {
        ctx.beginPath();
        ctx.arc(MX + b.x * scaleX, MY + b.y * scaleY, 2, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.fill();
    }

    // 현재 뷰포트 영역 (줌 적용)
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1;
    ctx.strokeRect(
        MX + camX * scaleX, MY + camY * scaleY,
        (VIEW_W / ZOOM) * scaleX, (VIEW_H / ZOOM) * scaleY
    );

    // 캐릭터 위치
    ctx.beginPath();
    ctx.arc(MX + worldMx * scaleX, MY + worldMy * scaleY, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // 테두리
    ctx.strokeStyle = '#444';
    ctx.strokeRect(MX, MY, MM_W, MM_H);
}

// ════════════════════════════════════════════════════
// 게임 오버
// ════════════════════════════════════════════════════
function doGameOver(elapsed) {
    running = false;
    cancelAnimationFrame(rafId);

    const sec = Math.floor(elapsed / 1000);
    if (sec > bestTime) bestTime = sec;
    const fmt = s => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;

    ctx.fillStyle = 'rgba(0,0,0,0.75)'; ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff5722'; ctx.font = 'bold 52px Arial';
    ctx.fillText('GAME OVER', VIEW_W / 2, VIEW_H / 2 - 80);
    ctx.fillStyle = '#fff'; ctx.font = '28px Arial';
    ctx.fillText(`생존 시간  ${fmt(sec)}`, VIEW_W / 2, VIEW_H / 2 - 20);
    ctx.fillStyle = '#ffd54f'; ctx.font = '22px Arial';
    ctx.fillText(`최고 기록  ${fmt(bestTime)}`, VIEW_W / 2, VIEW_H / 2 + 22);
    ctx.fillStyle = '#aaa'; ctx.font = '18px Arial';
    ctx.fillText('클릭하여 다시 시작', VIEW_W / 2, VIEW_H / 2 + 72);
    ctx.textAlign = 'left';

    canvas.addEventListener('click', onRestart);
}

function onRestart() {
    canvas.removeEventListener('click', onRestart);
    startGame();
}

init();
</script>
</body>
</html>
